name: Build and Release Resume

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install LaTeX packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            latexmk

      - name: Compile resume variants
        run: |
          latexmk -pdf -interaction=nonstopmode main.tex
          mv main.pdf resume.pdf

          latexmk -pdf -interaction=nonstopmode main_ai.tex
          mv main_ai.pdf resume-ai.pdf

          latexmk -pdf -interaction=nonstopmode main_backend.tex
          mv main_backend.pdf resume-backend.pdf

          latexmk -pdf -interaction=nonstopmode main_java.tex
          mv main_java.pdf resume-java.pdf

          latexmk -pdf -interaction=nonstopmode main_python.tex
          mv main_python.pdf resume-python.pdf

          latexmk -pdf -interaction=nonstopmode main_fullstack.tex
          mv main_fullstack.pdf resume-fullstack.pdf

      - name: Create GitHub Release with PDFs
        uses: ncipollo/release-action@v1
        with:
          tag: v1.0.${{ github.run_number }}
          name: Resume Release v1.0.${{ github.run_number }}
          artifacts: |
            resume.pdf
            resume-ai.pdf
            resume-backend.pdf
            resume-java.pdf
            resume-python.pdf
            resume-fullstack.pdf
          draft: false
          prerelease: false
          allowUpdates: true
          body: "Compiled resume variants from LaTeX sources."
          generateReleaseNotes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Set up rclone configuration
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload to OneDrive Public folder
        run: |
          rclone copy resume.pdf onedrive:Public/resume/ --progress
          rclone copy resume-ai.pdf onedrive:Public/resume/ --progress
          rclone copy resume-backend.pdf onedrive:Public/resume/ --progress
          rclone copy resume-java.pdf onedrive:Public/resume/ --progress
          rclone copy resume-python.pdf onedrive:Public/resume/ --progress
          rclone copy resume-fullstack.pdf onedrive:Public/resume/ --progress